name: Build

# Compile-only check for the whole solution on every push / PR to the main
# branches. Tests run in a separate workflow (test.yml).
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ThreeXui.Net.slnx

      - name: Build
        run: dotnet build ThreeXui.Net.slnx --configuration Release --no-restore

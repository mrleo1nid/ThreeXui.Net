name: Tests

# Runs the xUnit suite on every push / PR to the main branches.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ThreeXui.Net.slnx

      - name: Test
        run: dotnet test ThreeXui.Net.slnx --configuration Release --no-restore --verbosity normal
